name: Tienda Rápida WhatsApp
handle: tienda_whatsapp
icon: icon-shopping-cart

features:
  pages: true
  contact: true
  seo: true
  store: false   # fase futura: catálogo de productos

default_pages:
  - title: "Inicio"
    slug: ""
    layout: home
    is_published: true
    sort_order: 1
  - title: "Catálogo"
    slug: "catalogo"
    layout: default
    is_published: true
    sort_order: 2
  - title: "Cómo Comprar"
    slug: "como-comprar"
    layout: default
    is_published: true
    sort_order: 3
  - title: "Contacto"
    slug: "contacto"
    layout: contact
    is_published: true
    sort_order: 99

seo_defaults:
  title_format: "%s | {name}"
  default_description: "{name} — Compra fácil y rápido por WhatsApp. Envíos disponibles."
  sitemap_enabled: true
  robots_txt: "User-agent: *\nAllow: /"

contact_defaults:
  form_enabled: true
  success_message: "¡Pedido recibido! Te contactaremos por WhatsApp para confirmar."

recommended_notification: whatsapp
