fields:
    label:
        label: Nombre del canal
        type: text
        span: left
        required: true
        placeholder: "Email principal"

    type:
        label: Tipo
        type: dropdown
        span: right
        required: true
        comment: Selecciona el tipo para ver los campos de configuración.

    is_enabled:
        label: Habilitado
        type: checkbox
        default: true
        span: auto

    _section_email:
        label: Configuración Email
        type: section
        trigger:
            action: show
            field: type
            condition: value[email]

    config[to]:
        label: Email destino (para recibir mensajes)
        type: text
        span: full
        placeholder: admin@ejemplo.com
        trigger:
            action: show
            field: type
            condition: value[email]

    _section_smtp:
        label: Servidor SMTP (opcional — deja vacío para usar el servidor del sistema)
        type: section
        trigger:
            action: show
            field: type
            condition: value[email]

    config[smtp_host]:
        label: Host SMTP
        type: text
        span: left
        placeholder: smtp.gmail.com
        comment: Para Gmail usa smtp.gmail.com
        trigger:
            action: show
            field: type
            condition: value[email]

    config[smtp_port]:
        label: Puerto
        type: number
        span: right
        placeholder: 587
        comment: Gmail usa 587 (TLS) o 465 (SSL)
        trigger:
            action: show
            field: type
            condition: value[email]

    config[smtp_encryption]:
        label: Cifrado
        type: dropdown
        span: left
        options:
            "": Sin cifrado
            tls: TLS (recomendado)
            ssl: SSL
        trigger:
            action: show
            field: type
            condition: value[email]

    config[smtp_username]:
        label: Usuario SMTP
        type: text
        span: right
        placeholder: tucuenta@gmail.com
        trigger:
            action: show
            field: type
            condition: value[email]

    config[smtp_password]:
        label: Contraseña de aplicación
        type: password
        span: left
        comment: "Gmail: genera una en myaccount.google.com/apppasswords (no uses tu contraseña habitual)"
        trigger:
            action: show
            field: type
            condition: value[email]

    config[from_name]:
        label: Nombre del remitente
        type: text
        span: right
        placeholder: Mi Sitio Web
        trigger:
            action: show
            field: type
            condition: value[email]

    _section_whatsapp:
        label: Configuración WhatsApp
        type: section
        trigger:
            action: show
            field: type
            condition: value[whatsapp]

    config[phone_number_id]:
        label: Phone Number ID
        type: text
        span: left
        trigger:
            action: show
            field: type
            condition: value[whatsapp]

    config[whatsapp_to]:
        label: Número destino
        type: text
        span: right
        placeholder: "+59170000000"
        trigger:
            action: show
            field: type
            condition: value[whatsapp]

    config[access_token]:
        label: Access Token (Meta)
        type: text
        span: full
        trigger:
            action: show
            field: type
            condition: value[whatsapp]

    config[template_name]:
        label: Nombre del template
        type: text
        span: left
        default: contact_notification
        trigger:
            action: show
            field: type
            condition: value[whatsapp]

    _section_telegram:
        label: Configuración Telegram
        type: section
        trigger:
            action: show
            field: type
            condition: value[telegram]

    config[bot_token]:
        label: Bot Token
        type: text
        span: left
        trigger:
            action: show
            field: type
            condition: value[telegram]

    config[chat_id]:
        label: Chat ID
        type: text
        span: right
        trigger:
            action: show
            field: type
            condition: value[telegram]

    _section_sms:
        label: Configuración SMS (Twilio)
        type: section
        trigger:
            action: show
            field: type
            condition: value[sms]

    config[account_sid]:
        label: Account SID
        type: text
        span: left
        trigger:
            action: show
            field: type
            condition: value[sms]

    config[auth_token]:
        label: Auth Token
        type: text
        span: right
        trigger:
            action: show
            field: type
            condition: value[sms]

    config[from]:
        label: Número origen
        type: text
        span: left
        placeholder: "+15005550006"
        trigger:
            action: show
            field: type
            condition: value[sms]

    config[sms_to]:
        label: Número destino
        type: text
        span: right
        placeholder: "+59170000000"
        trigger:
            action: show
            field: type
            condition: value[sms]
