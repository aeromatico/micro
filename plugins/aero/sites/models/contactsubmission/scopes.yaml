scopes:
    status:
        label: Estado
        type: group
        conditions: "status in (:filtered)"
        options:
            pending: Pendiente
            sent: Enviado
            failed: Fallido
            partial: Parcial

    created_at:
        label: Fecha de recepción
        type: daterange
        conditions: "created_at >= ':after' AND created_at <= ':before'"
