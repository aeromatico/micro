fields:
    ad_set_id:
        label: aero.masterads::lang.fields.ad.ad_set
        type: dropdown
        span: left
        required: true

    meta_id:
        label: aero.masterads::lang.fields.ad.meta_id
        type: text
        span: right
        readOnly: true
        comment: "Identificador de Meta. No editable."

    name:
        label: aero.masterads::lang.fields.ad.name
        type: text
        span: left
        required: true

    status:
        label: aero.masterads::lang.fields.ad.status
        type: dropdown
        span: right
        required: true
        options:
            ACTIVE: ACTIVE
            PAUSED: PAUSED
            ARCHIVED: ARCHIVED
            DELETED: DELETED

    format:
        label: aero.masterads::lang.fields.ad.format
        type: dropdown
        span: left
        required: true
        options:
            image: image
            video: video
            carousel: carousel
            collection: collection

    creative:
        label: aero.masterads::lang.fields.ad.creative
        type: codeeditor
        language: json
        span: full
        size: large
        comment: "Definición del creativo (JSON)."
