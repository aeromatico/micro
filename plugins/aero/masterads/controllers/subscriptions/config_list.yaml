# ===========================================================================
# Subscriptions — ListController configuration
#
# Wires the Subscription list behavior to the column set declared in
# `models/subscription/columns.yaml`. Filtering by status and workspace is
# driven by `config_filter.yaml`. Each row links to the update form via
# `recordUrl`.
