# ===========================================================================
# AdSets — Filter scopes for ListController
#
# - `status`    : multi-select over the four lifecycle states emitted by
#                 Meta's `effective_status` field.
# - `campaign`  : narrows to a single parent campaign, displaying the
#                 campaign's `name` column.
#
# Validates: Requirements 6.1, 17.2
# ===========================================================================
scopes:
    status:
        label: Estado
        type: group
        conditions: "status in (:filtered)"
        options:
            ACTIVE: Activo
            PAUSED: Pausado
            ARCHIVED: Archivado
            DELETED: Eliminado
    campaign:
        label: Campaña
        type: relation
        nameFrom: name
        modelClass: Aero\MasterAds\Models\Campaign
