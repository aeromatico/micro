# ===========================================================================
# Ads — ListController configuration
#
# Wires the Ad list behavior to the column set declared in
# `models/ad/columns.yaml`. Each row links to the ad preview (read-only by
# default; the analyze action lives there). Filtering by status, creative
# format, and parent ad set is driven by `config_filter.yaml`.
#
# Validates: Requirements 6.1, 17.2, 20.1
# ===========================================================================
title: aero.masterads::lang.nav.ads
list: $/aero/masterads/models/ad/columns.yaml
modelClass: Aero\MasterAds\Models\Ad
recordUrl: aero/masterads/ads/preview/:id
toolbar:
    buttons: list_toolbar
    search:
        prompt: Buscar ad...
showSetup: true
recordsPerPage: 25
filter: config_filter.yaml
