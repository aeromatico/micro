# ===========================================================================
# Ads — FormController configuration
#
# Wires the Ad form behavior to the field set declared in
# `models/ad/fields.yaml`. Ads are ingested from Meta and are not normally
# created from this UI — only `update` and `preview` screens are exposed
# here.
#
# Validates: Requirements 6.1, 17.2, 20.1
# ===========================================================================
name: aero.masterads::lang.nav.ads
form: $/aero/masterads/models/ad/fields.yaml
modelClass: Aero\MasterAds\Models\Ad
defaultRedirect: aero/masterads/ads
update:
    title: Ad
    redirect: aero/masterads/ads
preview:
    title: Ad
