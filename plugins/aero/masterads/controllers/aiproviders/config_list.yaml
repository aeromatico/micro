# ===========================================================================
# AiProviders — ListController configuration
#
# Wires the AiProvider list behavior to the column set declared in
# `models/aiprovider/columns.yaml`. Each row links to the update form via
# `recordUrl`; a workspace filter is intentionally omitted here because
# the tenant global scope on the model already restricts visibility.
#
# Validates: Requirements 5.1, 5.4, 12.2, 17.2, 20.1
# ===========================================================================
title: aero.masterads::lang.nav.ai_providers
list: $/aero/masterads/models/aiprovider/columns.yaml
modelClass: Aero\MasterAds\Models\AiProvider
recordUrl: aero/masterads/aiproviders/update/:id
toolbar:
    buttons: list_toolbar
    search:
        prompt: Buscar proveedor IA...
showSetup: true
recordsPerPage: 20
