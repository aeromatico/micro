# ===========================================================================
# AiAnalyses — ListController configuration
#
# Wires the AiAnalysis list behavior to the column set declared in
# `models/aianalysis/columns.yaml`. Each row links to the preview screen
# (analyses are not directly editable) and exposes the `status`,
# `target_type` and `provider` scopes via `config_filter.yaml`.
#
# Validates: Requirements 6.10, 8.5, 16.2, 16.3, 17.2, 20.1
# ===========================================================================
title: aero.masterads::lang.nav.ai_analyses
list: $/aero/masterads/models/aianalysis/columns.yaml
modelClass: Aero\MasterAds\Models\AiAnalysis
recordUrl: aero/masterads/aianalyses/preview/:id
toolbar:
    buttons: list_toolbar
    search:
        prompt: Buscar análisis...
showSetup: true
recordsPerPage: 25
filter: config_filter.yaml
